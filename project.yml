name: Dictation
options:
  bundleIdPrefix: com.amerabb
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.0.0"

targets:
  Dictation:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: "Dictation needs microphone access to record your voice for transcription."
        SUFeedURL: "https://github.com/amerabb/Dictation/releases/latest/download/appcast.xml"
        SUPublicEDKey: "oQ1DeJTP1E6RW5uLURq29SrOobZWKoAz6wesMmFAKZg="
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400
    entitlements:
      path: Dictation.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        SWIFT_VERSION: "5"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "0.1.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.amerabb.dictation
    dependencies:
      - package: WhisperKit
      - package: KeyboardShortcuts
      - package: Sparkle
