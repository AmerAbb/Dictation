name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: xcodebuild -project Dictation.xcodeproj -scheme Dictation -resolvePackageDependencies

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Dictation.xcodeproj \
            -scheme Dictation \
            -configuration Release \
            -archivePath build/Dictation.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Dictation.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Zip app
        run: |
          cd build/export
          zip -r ../../Dictation.zip Dictation.app

      - name: Download Sparkle
        run: |
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-2.9.0.tar.xz | tar xJ -C /tmp

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          mkdir -p appcast_dir
          cp Dictation.zip appcast_dir/
          echo "$SPARKLE_PRIVATE_KEY" | /tmp/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/amerabb/Dictation/releases/download/${{ github.ref_name }}/" \
            appcast_dir

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            Dictation.zip \
            appcast_dir/appcast.xml \
            --title "${{ github.ref_name }}" \
            --generate-notes
